{% extends 'base.html' %}

{% block content %}
<style>
    /* Specific styles for the login view */
    .login-container {
        max-width: 420px;
        margin: 2rem auto;
        background: #fff;
        border-radius: 12px;
        padding: 2.5rem 2rem;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        font-family: system-ui, -apple-system, sans-serif;
    }
    .login-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    .login-logo {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 50px;
        height: 50px;
        background-color: #fff;
        border: 2px solid #e94560;
        clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        color: #e94560;
        font-weight: 800;
        font-size: 1.4rem;
        margin-bottom: 1rem;
    }
    .login-header h1 {
        font-size: 1.5rem;
        color: #111;
        margin-bottom: 0.5rem;
        font-weight: 700;
    }
    .login-header p {
        color: #777;
        font-size: 0.9rem;
        margin-bottom: 1rem;
    }
    .login-header .divider {
        width: 30px;
        height: 3px;
        background: #e94560;
        margin: 0 auto;
        border-radius: 2px;
    }
    
    .login-form-group {
        margin-bottom: 1.2rem;
    }
    .login-form-group label {
        display: block;
        font-weight: 700;
        font-size: 0.85rem;
        color: #222;
        margin-bottom: 0.5rem;
    }
    .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
    }
    .input-wrapper svg.icon-left {
        position: absolute;
        left: 14px;
        color: #888;
        width: 20px;
        height: 20px;
    }
    .input-wrapper input {
        width: 100%;
        padding: 0.75rem 1rem 0.75rem 2.8rem;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        font-size: 0.95rem;
        color: #333;
        outline: none;
        transition: border-color 0.2s;
    }
    .input-wrapper input:focus {
        border-color: #e94560;
    }
    
    .input-wrapper button.icon-right {
        position: absolute;
        right: 14px;
        background: none;
        border: none;
        cursor: pointer;
        color: #888;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
    }
    
    .input-wrapper button.icon-right:hover {
        color: #444;
    }

    .form-options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
        font-size: 0.85rem;
    }
    .form-options label {
        display: flex;
        align-items: center;
        color: #555;
        cursor: pointer;
        font-weight: 500;
    }
    .form-options label input {
        margin-right: 0.5rem;
        accent-color: #e94560;
        width: 16px;
        height: 16px;
    }
    .form-options a {
        color: #e94560;
        text-decoration: none;
    }
    .form-options a:hover {
        text-decoration: underline;
    }

    .btn-submit {
        width: 100%;
        background: #e94560;
        color: #fff;
        border: none;
        padding: 0.85rem;
        border-radius: 8px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
    }
    .btn-submit:hover {
        background: #d03d55;
    }
    .btn-submit svg {
        margin-right: 0.5rem;
        width: 20px;
        height: 20px;
    }

    .login-footer {
        margin-top: 2rem;
        text-align: center;
        position: relative;
    }
    .login-footer::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        background: #eee;
        z-index: 1;
    }
    .login-footer-text {
        position: relative;
        z-index: 2;
        background: #fff;
        padding: 0 1rem;
        color: #888;
        font-size: 0.85rem;
        display: inline-block;
    }
    .login-footer-text a {
        color: #e94560;
        text-decoration: none;
        font-weight: 600;
    }
    .login-footer-text a:hover {
        text-decoration: underline;
    }
    .login-error {
        color: #e94560;
        font-size: 0.85rem;
        background: #fdf5f6;
        padding: 0.75rem;
        border-radius: 6px;
        margin-bottom: 1.2rem;
        text-align: center;
        font-weight: 500;
    }
</style>

<div class="login-container">
    <div class="login-header">
        <div class="login-logo">FB</div>
        <h1>Bienvenido de vuelta</h1>
        <p>Ingresa a tu cuenta para continuar</p>
        <div class="divider"></div>
    </div>

    <form method="post">
        {% csrf_token %}
        
        {% if form.errors %}
            <div class="login-error">Email o contraseña incorrectos.</div>
        {% endif %}

        <div class="login-form-group">
            <label for="id_username">Email</label>
            <div class="input-wrapper">
                <svg class="icon-left" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
                <!-- Render standard django form.username with custom attributes, but easier to use manual input -->
                <input type="text" name="username" id="id_username" placeholder="Ingresa tu email" required>
            </div>
        </div>

        <div class="login-form-group">
            <label for="id_password">Contraseña</label>
            <div class="input-wrapper">
                <svg class="icon-left" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
                <input type="password" name="password" id="id_password" placeholder="Ingresa tu contraseña" required>
                <button type="button" class="icon-right" onclick="togglePassword()" title="Mostrar/Ocultar contraseña">
                    <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width: 20px; height: 20px;">
                      <!-- Default: Eye crossed out -->
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                    </svg>
                </button>
            </div>
        </div>

        <div class="form-options">
            <label>
                <input type="checkbox" name="remember" id="id_remember">
                Recordarme
            </label>
            <a href="#">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn-submit">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M11 16l4-4m0 0l-4-4m4 4H3m14 4v1a2 2 0 01-2 2H6a2 2 0 01-2-2V7a2 2 0 012-2h9a2 2 0 012 2v1" />
            </svg>
            Ingresar
        </button>
    </form>

    <div class="login-footer">
        <div class="login-footer-text">
            ¿No tienes cuenta? <a href="{% url 'register' %}">Regístrate</a>
        </div>
    </div>
</div>

<script>
    function togglePassword() {
        const passwordInput = document.getElementById('id_password');
        const eyeIcon = document.getElementById('eye-icon');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
        } else {
            passwordInput.type = 'password';
            eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />';
        }
    }
</script>
{% endblock %}
