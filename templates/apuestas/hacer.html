{% extends 'base.html' %}

{% block content %}
<h1>Realizar apuesta</h1>

<div class="card" style="max-width:450px; margin:0 auto">
    <h3>{{ evento.local }} vs {{ evento.visitante }}</h3>
    <p>{{ evento.fecha_inicio|date:"d/m/Y H:i" }}</p>
    <p>Seleccion: <strong>{{ seleccion.get_tipo_display }}</strong> — Cuota: <strong>{{ seleccion.cuota }}</strong></p>

    <form method="post">
        {% csrf_token %}
        <input type="hidden" name="transaction_id" id="transaction_id">
        <div class="form-group">
            <label>Monto a apostar (S/ 1.00 - S/ 10,000.00)</label>
            <input type="number" name="monto" step="0.0001" min="1" max="10000" required
                   placeholder="Ej: 100.00">
        </div>
        <div class="form-group">
            <p style="font-size:0.85rem; color:#666">
                Ganancia potencial: <strong id="ganancia">--</strong>
            </p>
        </div>
        <button type="submit" class="btn btn-primary">Confirmar apuesta</button>
    </form>
</div>

<script>
    if (window.crypto && window.crypto.randomUUID) {
        document.getElementById('transaction_id').value = window.crypto.randomUUID();
    } else {
        document.getElementById('transaction_id').value = 'tx-' + Math.random().toString(36).substring(2) + Date.now().toString(36);
    }

    document.querySelector('input[name="monto"]').addEventListener('input', function() {
        const monto = parseFloat(this.value) || 0;
        const cuota = {{ seleccion.cuota|stringformat:".2f" }};
        document.getElementById('ganancia').textContent = 'S/ ' + (monto * cuota).toFixed(2);
    });
</script>
{% endblock %}
