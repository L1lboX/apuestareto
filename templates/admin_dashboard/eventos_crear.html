{% extends 'admin_dashboard/base_admin.html' %}
{% load static %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Crear Evento</h1>
<form method="post" class="space-y-4 max-w-lg">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="grid grid-cols-3 gap-2">
        <div>
            <label class="block text-sm font-medium mb-1" for="id_cuota_1">Cuota 1</label>
            <input type="number" step="0.01" name="cuota_1" id="id_cuota_1" class="form-input" required>
        </div>
        <div>
            <label class="block text-sm font-medium mb-1" for="id_cuota_X">Cuota X</label>
            <input type="number" step="0.01" name="cuota_X" id="id_cuota_X" class="form-input" required>
        </div>
        <div>
            <label class="block text-sm font-medium mb-1" for="id_cuota_2">Cuota 2</label>
            <input type="number" step="0.01" name="cuota_2" id="id_cuota_2" class="form-input" required>
        </div>
    </div>
    <button type="submit" class="btn mt-4">Crear Evento</button>
</form>
{% endblock %}
